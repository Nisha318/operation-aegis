# ============================================================
# Operation Aegis - Reporting
# Triggers: after sast-sca, dast, or secrets-scan complete,
#           workflow_dispatch (re-run reports without re-scanning)
#
# Jobs:
#   1. aggregate  - download all artifacts, build summary
#                   report, send Slack notification
# ============================================================

name: "Reporting"

on:
  workflow_run:
    workflows:
      - "SAST + SCA"
      - "DAST"
      - "Secrets scan"
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:

  # ──────────────────────────────────────────────────────────
  # JOB 1: aggregate
  # ──────────────────────────────────────────────────────────
  aggregate:
    name: "Aggregate reports + notify"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Download all scan artifacts
      - name: Download artifacts from SAST + SCA workflow
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: sast-sca.yml
          run_type: completed
          path: all-artifacts/sast-sca
        continue-on-error: true

      - name: Download artifacts from DAST workflow
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: dast.yml
          run_type: completed
          path: all-artifacts/dast
        continue-on-error: true

      - name: Download artifacts from secrets-scan workflow
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: secrets-scan.yml
          run_type: completed
          path: all-artifacts/secrets
        continue-on-error: true

      # 2. Build unified Markdown report
      - name: Build summary report
        run: |
          REPORT="aegis-security-report.md"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TIMESTAMP=$(date -u "+%Y-%m-%d %H:%M UTC")

          cat >> $REPORT << EOF
          # Operation Aegis - Security Report
          **Generated:** $TIMESTAMP
          **Run:** $RUN_URL
          **Commit:** ${{ github.sha }}

          ---

          ## SAST + SCA
          EOF

          if find all-artifacts/sast-sca -name "*.sarif" 2>/dev/null | grep -q codeql; then
            FINDINGS=$(grep -r '"level": "error"' all-artifacts/sast-sca/ | wc -l || echo 0)
            echo "- **CodeQL:** $FINDINGS HIGH/CRITICAL findings" >> $REPORT
          else
            echo "- **CodeQL:** artifact not available" >> $REPORT
          fi

          if find all-artifacts/sast-sca -name "*.sarif" 2>/dev/null | grep -q semgrep; then
            FINDINGS=$(grep -r '"level": "error"' all-artifacts/sast-sca/ | wc -l || echo 0)
            echo "- **Semgrep:** $FINDINGS HIGH/CRITICAL findings" >> $REPORT
          else
            echo "- **Semgrep:** artifact not available" >> $REPORT
          fi

          if find all-artifacts/sast-sca -name "trivy-image-report.txt" 2>/dev/null | grep -q .; then
            echo "" >> $REPORT
            echo "### Trivy image scan" >> $REPORT
            echo '```' >> $REPORT
            cat all-artifacts/sast-sca/trivy-reports/trivy-image-report.txt >> $REPORT 2>/dev/null || echo "Report not found."
            echo '```' >> $REPORT
          fi

          cat >> $REPORT << 'EOF'

          ---

          ## DAST
          EOF

          if find all-artifacts/dast -name "report_html.html" 2>/dev/null | grep -q .; then
            echo "- **OWASP ZAP:** report available - see zap-reports artifact" >> $REPORT
          else
            echo "- **OWASP ZAP:** artifact not available" >> $REPORT
          fi

          if find all-artifacts/dast -name "nikto-report.txt" 2>/dev/null | grep -q .; then
            echo "" >> $REPORT
            echo "### Nikto findings" >> $REPORT
            echo '```' >> $REPORT
            cat all-artifacts/dast/nikto-reports/nikto-report.txt >> $REPORT 2>/dev/null || echo "Report not found."
            echo '```' >> $REPORT
          else
            echo "- **Nikto:** artifact not available" >> $REPORT
          fi

          cat >> $REPORT << 'EOF'

          ---

          ## Secrets scan
          EOF

          if find all-artifacts/secrets -name "*.sarif" 2>/dev/null | grep -q .; then
            FINDINGS=$(grep -r '"level": "error"' all-artifacts/secrets/ | wc -l || echo 0)
            echo "- **Gitleaks:** $FINDINGS findings" >> $REPORT
          else
            echo "- **Gitleaks:** artifact not available" >> $REPORT
          fi

          if find all-artifacts/secrets -name "trufflehog-results.json" 2>/dev/null | grep -q .; then
            COUNT=$(wc -l < all-artifacts/secrets/trufflehog-report/trufflehog-results.json 2>/dev/null || echo 0)
            echo "- **TruffleHog:** $COUNT findings" >> $REPORT
          else
            echo "- **TruffleHog:** artifact not available" >> $REPORT
          fi

          cat >> $REPORT << 'EOF'

          ---

          *Operation Aegis - DevSec Blueprint capstone - #DevSecBlueprint*
          EOF

          echo "Report written to $REPORT"
          cat $REPORT

      - name: Upload summary report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: aegis-security-report
          path: aegis-security-report.md
          retention-days: 90

      - name: Write report to GitHub Actions job summary
        run: cat aegis-security-report.md >> $GITHUB_STEP_SUMMARY

      # 3. Slack notification
      - name: Determine overall pipeline status
        id: status
        run: |
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          if [ "$CONCLUSION" = "success" ]; then
            echo "color=good" >> $GITHUB_OUTPUT
            echo "text=All scans passed" >> $GITHUB_OUTPUT
          elif [ -z "$CONCLUSION" ]; then
            echo "color=#378ADD" >> $GITHUB_OUTPUT
            echo "text=Manual report run" >> $GITHUB_OUTPUT
          else
            echo "color=danger" >> $GITHUB_OUTPUT
            echo "text=Scan failures detected - review required" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.26.0
        continue-on-error: true
        with:
          payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.status.outputs.color }}",
                  "blocks": [
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*Operation Aegis - Security Pipeline*\n${{ steps.status.outputs.text }}"
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        {
                          "type": "mrkdwn",
                          "text": "*Repo:*\n${{ github.repository }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Commit:*\n`${{ github.sha }}`"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Triggered by:*\n${{ github.event.workflow_run.name || 'Manual run' }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Branch:*\n${{ github.ref_name }}"
                        }
                      ]
                    },
                    {
                      "type": "actions",
                      "elements": [
                        {
                          "type": "button",
                          "text": {
                            "type": "plain_text",
                            "text": "View run"
                          },
                          "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                        }
                      ]
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK