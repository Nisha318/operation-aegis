# ============================================================
# Operation Aegis — Secrets Scanning
# Triggers: pull_request to main, push to main,
#           schedule (nightly), workflow_dispatch
#
# Jobs:
#   1. gitleaks    — scan full commit history for secrets
#   2. trufflehog  — entropy-based deep scan
#   3. gate        — evaluate results, write job summary
#
# Both scanners run in parallel — no shared state required.
# ============================================================

name: "Secrets scan"

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:

  # ──────────────────────────────────────────────────────────
  # JOB 1: Gitleaks
  # Scans the full commit history and current working tree
  # for known secret patterns: API keys, tokens, passwords,
  # connection strings, private keys, and more.
  #
  # Detects VULN-001 (hardcoded AWS key, DB password, JWT
  # secret) in main.py.
  # ──────────────────────────────────────────────────────────
  gitleaks:
    name: "Gitleaks — commit history scan"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history — gitleaks needs every commit

      - name: Run Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # optional — enables org scanning
        continue-on-error: true    # gate handles the fail decision

      - name: Upload Gitleaks SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif
          category: gitleaks
        continue-on-error: true

      - name: Upload Gitleaks report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: results.sarif
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  # JOB 2: TruffleHog
  # Entropy-based scanning — catches secrets that don't match
  # known patterns by looking for high-entropy strings.
  # Complements Gitleaks: where Gitleaks matches patterns,
  # TruffleHog finds secrets that look random even if they
  # don't match a known format.
  #
  # Also detects VULN-001 — useful to show both tools
  # flagging the same finding from different angles in the
  # blog post write-up.
  # ──────────────────────────────────────────────────────────
  trufflehog:
    name: "TruffleHog — entropy scan"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: >
            --only-verified
            --json
            --output trufflehog-results.json
        continue-on-error: true

      - name: Upload TruffleHog report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trufflehog-report
          path: trufflehog-results.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  # JOB 3: Gate
  # Evaluates both scanner results and writes a summary to
  # the GitHub Actions job summary UI.
  # Fails the workflow if either scanner found secrets.
  # if: always() ensures this runs even if a scanner crashed.
  # ──────────────────────────────────────────────────────────
  gate:
    name: "Quality gate — secrets"
    runs-on: ubuntu-latest
    needs: [gitleaks, trufflehog]
    if: always()

    steps:
      - name: Download all secrets scan artifacts
        uses: actions/download-artifact@v4
        with:
          path: secrets-results

      - name: Evaluate gate and write job summary
        run: |
          echo "## Secrets Scan Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          FAILED=0

          if [ "${{ needs.gitleaks.result }}" != "success" ]; then
            echo "❌ Gitleaks: FAILED (${{ needs.gitleaks.result }})" >> $GITHUB_STEP_SUMMARY
            FAILED=1
          else
            echo "✅ Gitleaks: passed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.trufflehog.result }}" != "success" ]; then
            echo "❌ TruffleHog: FAILED (${{ needs.trufflehog.result }})" >> $GITHUB_STEP_SUMMARY
            FAILED=1
          else
            echo "✅ TruffleHog: passed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Surface TruffleHog findings in the summary if the report exists
          if [ -f secrets-results/trufflehog-report/trufflehog-results.json ]; then
            COUNT=$(wc -l < secrets-results/trufflehog-report/trufflehog-results.json || echo 0)
            if [ "$COUNT" -gt "0" ]; then
              echo "### TruffleHog findings ($COUNT)" >> $GITHUB_STEP_SUMMARY
              echo '```json' >> $GITHUB_STEP_SUMMARY
              head -20 secrets-results/trufflehog-report/trufflehog-results.json >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$FAILED" -eq "1" ]; then
            echo "### 🚨 Gate FAILED — secrets detected. Rotate credentials and purge from history." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "### ✅ Gate PASSED — no secrets detected." >> $GITHUB_STEP_SUMMARY
          fi
